# ========================
# Production Profile
# Activated via SPRING_PROFILES_ACTIVE=prod
# ========================

# Application
spring.application.name=gonErp
server.port=8080

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# File Upload (Docker volume mount paths)
app.upload.dir=/app/uploads/images
app.upload.taskmanager=/app/uploads/taskmanager
app.upload.users=/app/uploads/users
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# R2 Storage
app.storage.r2.endpoint=${R2_ENDPOINT}
app.storage.r2.access-key=${R2_ACCESS_KEY}
app.storage.r2.secret-key=${R2_SECRET_KEY}
app.storage.r2.bucket=${R2_BUCKET}
app.storage.r2.public-url=${R2_PUBLIC_URL}

# Logging (production: minimal)
logging.level.com.gonerp=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
